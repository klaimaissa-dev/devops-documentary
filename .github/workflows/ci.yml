# .github/workflows/ci.yml
# ============================================================
# CI Pipeline — runs on every push to every branch
#
# Jobs (each one blocks the next if it fails):
#   1. lint         — ESLint on backend + frontend
#   2. test         — Jest unit tests with coverage
#   3. sonarqube    — code quality gate
#   4. docker-scan  — build images + Trivy security scan
#   5. docker-push  — push to DockerHub (main branch only)
# ============================================================

name: CI Pipeline

on:
  push:
    branches: ["**"]        # every branch
  pull_request:
    branches: [main, dev]   # PRs targeting main or dev

env:
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/devops-documentary-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/devops-documentary-frontend

jobs:

  # ----------------------------------------------------------
  # JOB 1 — Lint
  # ----------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache node_modules — saves ~2min on every run
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

  # ----------------------------------------------------------
  # JOB 2 — Test
  # ----------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint               # only runs if lint passes

    services:
      # Spin up a real PostgreSQL for the tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       devops_documentary_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     devops_documentary_test
          DB_USER:     postgres
          DB_PASSWORD: testpassword

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

      # Save coverage reports so SonarQube can read them
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ----------------------------------------------------------
  # JOB 3 — SonarQube
  # ----------------------------------------------------------
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test               # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history needed for blame info

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # qualitygate.wait=true blocks the pipeline until
      # SonarQube returns pass or fail
      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ----------------------------------------------------------
  # JOB 4 — Docker Build + Trivy Security Scan
  # ----------------------------------------------------------
  docker-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: sonarqube

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          outputs: type=docker

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          outputs: type=docker

      # Trivy scans for known CVEs
      # exit-code: 1 means the pipeline FAILS if CRITICAL found
      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          format:    table
          exit-code: "1"
          severity:  CRITICAL,HIGH

      - name: Trivy scan — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          format:    table
          exit-code: "1"
          severity:  CRITICAL,HIGH

      # Scan the source code too (warn only — don't block)
      - name: Trivy scan — source code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  .
          format:    table
          exit-code: "0"

  # ----------------------------------------------------------
  # JOB 5 — Push to DockerHub (main branch only)
  # ----------------------------------------------------------
  docker-push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: docker-scan
    # Only push when merging to main — not on every feature branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Two tags: one with the commit SHA (immutable), one as latest
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
