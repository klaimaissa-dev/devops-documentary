# frontend-deployment.yaml
# IMAGE: replace klaimaissa-dev with your actual username
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-documentary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: klaimaissa/devops-documentary-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
