# postgres-deployment.yaml
# A Deployment tells Kubernetes how to run and maintain pods.
# replicas: 1 means one postgres pod running at all times.
# If it crashes, Kubernetes restarts it automatically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devops-documentary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          # Liveness probe — restart pod if postgres stops responding
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
