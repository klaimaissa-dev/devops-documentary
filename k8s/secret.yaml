# secret.yaml
# Secrets store sensitive data encoded in base64.
# In production you would use Sealed Secrets or Vault instead.
# NEVER commit real production passwords here.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devops-documentary
type: Opaque
data:
  DB_PASSWORD: ZGV2cGFzc3dvcmQ=   # "devpassword" in base64
